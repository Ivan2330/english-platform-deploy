worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Логи (можеш підправити шляхи, якщо треба)
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Upstream до FastAPI в Docker
    upstream backend {
        server backend:8000;
    }

    # ---------------- HTTP (порт 80) ----------------
    server {
        listen 80;
        server_name my-prime-academy.online;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Все інше — редіректимо на https
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------- HTTPS (порт 443) ----------------
    server {
        listen 443 ssl http2;
        server_name my-prime-academy.online;

        # Сертифікати Let’s Encrypt (volume /etc/letsencrypt)
        ssl_certificate     /etc/letsencrypt/live/my-prime-academy.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/my-prime-academy.online/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1h;

        add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        # Статичний фронтенд (SPA)
        root /usr/share/nginx/html;
        index index.html index.htm;

        # ---- Заборона доступу до чутливих файлів (.env, .git тощо) ----
        location ~ /\.(env|env\..*|git|hg|svn|htaccess|htpasswd|DS_Store) {
            deny all;
        }

        # favicon
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            try_files /favicon.ico =404;
        }

        # robots.txt
        location = /robots.txt {
            access_log off;
            log_not_found off;
            try_files /robots.txt =404;
        }

        # Головний роутинг для SPA (React/Vite)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # -------- API → FastAPI backend --------
        location /api/ {
            # Прибираємо /api/ перед проксуванням
            rewrite ^/api/(.*)$ /$1 break;

            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;

            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";

            proxy_read_timeout  300;
            proxy_send_timeout  300;
        }

        # -------- WebSocket /ws/ --------
        location /ws/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;

            proxy_read_timeout  300;
            proxy_send_timeout  300;
        }

        # -------- WebSocket /calls-ws/ --------
        location /calls-ws/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;

            proxy_read_timeout  300;
            proxy_send_timeout  300;
        }

        # -------- WebSocket /chat-ws/ --------
        location /chat-ws/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;

            proxy_read_timeout  300;
            proxy_send_timeout  300;
        }

        # -------- WebSocket /classroom-ws/ --------
        location /classroom-ws/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_read_timeout  300;
            proxy_send_timeout  300;
        }
    }
}
